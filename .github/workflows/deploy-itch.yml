name: deploy to itch.io

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kagemoguri
        uses: actions/checkout@v4

      - name: Checkout private game assets
        uses: actions/checkout@v4
        with:
          repository: TasukuTSUKIOKA/game
          token: ${{ secrets.GAME_REPO_TOKEN }}
          path: private-game

      - name: Restore sounds
        run: |
          rm -rf sounds
          mkdir -p sounds
          cp -r private-game/sounds/. sounds/

      - name: Setup butler
        uses: jdno/setup-butler@v1

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          ITCH_TARGET: ${{ vars.ITCH_TARGET }}
        run: butler push . "$ITCH_TARGET" --userversion "${{ github.sha }}"
