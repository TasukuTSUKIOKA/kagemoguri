name: deploy to github pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout kagemoguri
        uses: actions/checkout@v4

      - name: Checkout private game assets
        uses: actions/checkout@v4
        with:
          repository: TasukuTSUKIOKA/game
          token: ${{ secrets.GAME_REPO_TOKEN }}
          path: private-game

      - name: Restore sounds
        run: |
          mkdir -p sounds
          cp private-game/sounds/bgm.mp3 sounds/bgm.mp3
          cp private-game/sounds/sfx-sprite.mp3 sounds/sfx-sprite.mp3

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
